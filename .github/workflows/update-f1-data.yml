# .github/workflows/update-f1-data.yml
name: Update F1 Data

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run fetch script
        run: npx tsx scripts/fetchF1Data.ts

      - name: Check what changed
        run: |
          echo "=== Git status ==="
          git status
          echo "=== public/data diff ==="
          git diff public/data/ || true
          echo "=== File sizes ==="
          ls -la public/data/

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          echo "=== Staged files ==="
          git diff --cached --name-only
          git diff --cached --quiet && echo "NO CHANGES TO COMMIT" || (git commit -m "chore: update F1 race data [skip ci]" && git push)
